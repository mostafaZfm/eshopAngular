<div class="admin-layout d-flex" style="min-height: 100vh; direction: ltr;">

      <li class="nav-item mb-2">
        <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-link text-white">Dashboard</a>
      </li>
      <li class="nav-item mb-2">
        <a routerLink="/admin/products" routerLinkActive="active" class="nav-link text-white">Products</a>
